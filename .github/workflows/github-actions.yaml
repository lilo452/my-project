name: my-proj
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Standard Checkout Action
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Log in to Docker Hub (or your preferred registry)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 4: Build the image and push it to the registry
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/myapp:0.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Runs git clone
        run: |
          git clone https://lilo452:${{ secrets.REPO_TOKEN }}@github.com/lilo452/argo-gitops.git
          helm template my-app chart > argo-gitops/my-app.yaml
          git add .
          git push
